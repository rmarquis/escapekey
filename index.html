<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Escape Key</title>
<style>
/* === RESET & BASE === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1b26;
  --bg-above: #1f2030;
  --bg-surface: #24283b;
  --bg-key: #2a2e42;
  --text: #c0caf5;
  --text-sub: #9aa5ce;
  --text-dim: #565f89;
  --border: #3b3d57;

  --cat-motion: #7dcfff;
  --cat-command: #e0af68;
  --cat-insert: #f7768e;
  --cat-operator: #9ece6a;
  --cat-extra: #bb9af7;
  --cat-count: #565f89;

  --key-size: 90px;
  --key-gap: 5px;
  --key-unit: calc(var(--key-size) + var(--key-gap));
  --key-radius: 7px;
}

/* Light theme overrides */
html[data-theme="light"] {
  --bg: #f0f0f5;
  --bg-above: #e4e4ec;
  --bg-surface: #ffffff;
  --bg-key: #ffffff;
  --text: #1a1b26;
  --text-sub: #4a4f6a;
  --text-dim: #8890a8;
  --border: #d0d4e0;

  --cat-motion: #0077b6;
  --cat-command: #b8860b;
  --cat-insert: #c4314b;
  --cat-operator: #3a7d28;
  --cat-extra: #7c3aed;
  --cat-count: #8890a8;
}

html { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px 48px;
}

.container {
  width: 100%;
  max-width: 1540px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* === HEADER === */
header { text-align: center; }
header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
header .subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.usage-hint {
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* === CONTROLS === */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
}


.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-btn:hover { color: var(--text); border-color: var(--text-dim); }
.filter-btn.active {
  background: var(--bg-surface);
  color: var(--text);
  border-color: var(--cat-extra);
}

/* Shift toggle */
.shift-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim); }
.toggle-track {
  width: 38px; height: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}
.toggle-track.active { background: var(--cat-extra); border-color: var(--cat-extra); }
.toggle-thumb {
  width: 16px; height: 16px;
  background: var(--text);
  border-radius: 50%;
  position: absolute;
  top: 1px; left: 1px;
  transition: transform 0.2s;
}
.toggle-track.active .toggle-thumb { transform: translateX(18px); }

/* === KEYBOARD === */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: var(--key-gap);
  padding: 20px;
  background: var(--bg-above);
  border-radius: 14px;
  border: 1px solid var(--border);
}

.kb-row {
  display: flex;
  gap: var(--key-gap);
}

/* Esc row: Esc key + inline controls panel */
.kb-row-esc {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 8px;
}
.kb-esc-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  flex-wrap: wrap;
}
.kb-esc-controls .legend-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.kb-esc-controls .legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  color: var(--text-sub);
}
.kb-esc-controls .legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.kb-esc-controls .shift-toggle {
  margin-left: auto;
}
.kb-esc-search {
  flex: 1;
  position: relative;
  min-width: 120px;
  max-width: 280px;
}
.kb-esc-search input {
  width: 100%;
  padding: 6px 10px 6px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
.kb-esc-search input:focus { border-color: var(--cat-extra); }
.kb-esc-search::before {
  content: '\2315';
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.9rem;
}
.key-esc {
  width: auto;
  padding: 0 14px;
  height: var(--key-size);
}
/* Wide keys */
.key-wide {
  font-size: 11px;
  letter-spacing: -0.02em;
}
.key-wide .key-char {
  font-size: 13px;
  font-weight: 500;
}
.key-wide .key-label {
  font-size: 9px;
}
.key-flex {
  flex: 1;
  width: auto !important;
}
/* Faded modifier/non-primary keys */
.key-faded {
  opacity: 0.45;
}
.key-faded:hover {
  opacity: 0.75;
}
.key-faded.dimmed {
  opacity: 0.08;
}
.key-faded.dimmed:hover {
  opacity: 0.3;
}
.key-pressed {
  opacity: 1 !important;
  transform: translateY(1px);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 1px 1px rgba(0,0,0,0.15);
}

/* === KEY === */
.key {
  width: var(--key-size);
  height: var(--key-size);
  background: var(--bg-key);
  border-radius: var(--key-radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  position: relative;
  border: 1px solid transparent;
  border-bottom: 3px solid transparent;
  transition: all 0.15s ease;
  box-shadow: 0 1px 0 1px rgba(0,0,0,0.2), 0 2px 3px rgba(0,0,0,0.15);
}

.key:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 0 1px rgba(0,0,0,0.2), 0 4px 10px rgba(0,0,0,0.25);
}
.key:active {
  transform: translateY(1px);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 1px 1px rgba(0,0,0,0.15);
}
.key.selected {
  transform: translateY(-2px);
  outline: 2px solid var(--text);
  outline-offset: 1px;
}
.key.dimmed {
  opacity: 0.12;
}
.key.dimmed:hover {
  opacity: 0.4;
}

/* Category colors — applied as border-bottom + char color */
.key[data-cat="motion"]  { border-bottom-color: var(--cat-motion); }
.key[data-cat="command"] { border-bottom-color: var(--cat-command); }
.key[data-cat="insert"]  { border-bottom-color: var(--cat-insert); }
.key[data-cat="operator"]{ border-bottom-color: var(--cat-operator); }
.key[data-cat="extra"]   { border-bottom-color: var(--cat-extra); }
.key[data-cat="count"]   { border-bottom-color: var(--cat-count); }

.key[data-cat="motion"]  .key-char { color: var(--cat-motion); }
.key[data-cat="command"] .key-char { color: var(--cat-command); }
.key[data-cat="insert"]  .key-char { color: var(--cat-insert); }
.key[data-cat="operator"] .key-char { color: var(--cat-operator); }
.key[data-cat="extra"]   .key-char { color: var(--cat-extra); }
.key[data-cat="count"]   .key-char { color: var(--cat-count); }

.key-char {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
}
.key-label {
  font-size: 12px;
  line-height: 1.15;
  color: var(--text-sub);
  text-align: center;
  max-width: calc(var(--key-size) - 8px);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Dot indicator for keys needing a char argument */
.key-dot {
  position: absolute;
  top: 3px; right: 5px;
  font-size: 14px;
  line-height: 1;
  color: var(--text-dim);
}

/* === DETAIL PANEL === */
.detail-panel {
  width: 100%;
  min-height: 100px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 0.85rem;
  line-height: 1.5;
}
.detail-placeholder { color: var(--text-dim); text-align: center; padding: 12px; }

.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.detail-keychar {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}
.detail-title { font-size: 1.1rem; font-weight: 600; }
.detail-cat {
  font-size: 0.75rem;
  padding: 2px 10px;
  border-radius: 12px;
  border: 1px solid;
  display: inline-block;
}
.detail-body { display: flex; gap: 24px; flex-wrap: wrap; }
.detail-section { flex: 1; min-width: 200px; }
.detail-section h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.detail-section p, .detail-section li {
  color: var(--text-sub);
  font-size: 0.82rem;
}
.detail-section ul { list-style: none; }
.detail-section li { margin-bottom: 2px; }
.note-ref {
  background: var(--bg-key);
  padding: 8px 12px;
  border-radius: 6px;
  margin-top: 6px;
  font-size: 0.8rem;
  color: var(--text-sub);
  border-left: 3px solid var(--cat-extra);
}

/* === LEGEND & REFERENCE === */
.reference {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
.ref-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
}
.ref-card h3 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.legend-items { display: flex; flex-wrap: wrap; gap: 10px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text-sub);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ref-list { display: flex; flex-direction: column; gap: 4px; }
.ref-row {
  display: flex;
  gap: 10px;
  font-size: 0.8rem;
}
.ref-cmd {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
  color: var(--cat-command);
  min-width: 90px;
  font-size: 0.78rem;
}
.ref-desc { color: var(--text-sub); }

.credit {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 8px;
}
.credit a { color: var(--text-dim); text-decoration: underline; }

/* Level selector */
.level-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text-dim);
  min-height: 28px;
}
.level-bar.hidden { display: none; }
.level-btns { display: flex; gap: 4px; }
.level-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.level-btn:hover { color: var(--text); border-color: var(--text-dim); }
.level-btn.active {
  background: var(--cat-extra);
  color: var(--bg);
  border-color: var(--cat-extra);
  font-weight: 600;
}
.level-label {
  font-size: 0.72rem;
  color: var(--text-sub);
  margin-left: 4px;
}

/* Theme selector */
.theme-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim); }
.theme-select {
  padding: 4px 8px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.theme-select:focus { border-color: var(--cat-extra); }

/* Light theme key shadow adjustments */
html[data-theme="light"] .key {
  box-shadow: 0 1px 0 1px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.08);
  border-top: 1px solid var(--border);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
html[data-theme="light"] .key:hover {
  box-shadow: 0 2px 0 1px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.12);
}
html[data-theme="light"] .key:active {
  box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 1px 1px rgba(0,0,0,0.08);
}

/* === RESPONSIVE === */
@media (max-width: 1200px) {
  :root { --key-size: 72px; }
  .key-char { font-size: 20px; }
  .key-label { font-size: 11px; }
}
@media (max-width: 900px) {
  :root { --key-size: 42px; }
  .key-char { font-size: 11px; }
  .key-label { font-size: 0; visibility: hidden; }
  .key-dot { font-size: 10px; }
  .reference { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>The Escape Key</h1>
    <p class="subtitle">Learn Vim. Then leave.</p>
  </header>

  <div class="controls">
    <div class="filters" id="filters"></div>
    <div class="level-bar hidden" id="level-bar"></div>
    <p class="usage-hint">Hover, click, or press keys &middot; Hold Shift for shifted layer &middot; &larr;&rarr; categories &middot; &uarr;&darr; levels</p>
  </div>

  <div class="keyboard" id="keyboard"></div>
  <div class="detail-panel" id="detail"></div>

  <div class="reference">
    <div class="ref-card">
      <h3>Important ex commands</h3>
      <div class="ref-list" id="ex-cmds"></div>
    </div>
    <div class="ref-card">
      <h3>Ctrl commands</h3>
      <div class="ref-list" id="ctrl-cmds"></div>
    </div>
    <div class="ref-card">
      <h3>Tips</h3>
      <div class="ref-list" id="tips"></div>
    </div>
  </div>

  <p class="credit" id="credit"></p>
</div>

<script>
// =============================================================================
// DATA
// =============================================================================
// Each key: { normal: { char, label, cat, tags, dot }, shifted: { ... }, notes: [] }
// cat values: 'motion' | 'command' | 'insert' | 'operator' | 'extra' | 'count'
// tags: used for filter buttons (matching the spreadsheet sheet tabs)
// dot: true if the key expects a follow-up character argument

var KEYS = {
  'Escape': {
    normal:  { char: 'Esc', label: 'normal mode', cat: 'command', tags: ['modes'] },
    shifted: { char: 'Esc', label: 'normal mode', cat: 'command', tags: ['modes'] },
    notes: [],
  },
  '`': {
    normal:  { char: '`', label: 'goto mark',    cat: 'extra',    tags: ['marks'], dot: true },
    shifted: { char: '~', label: 'toggle case',  cat: 'command',  tags: ['actions'] },
    notes: [],
  },
  '1': {
    normal:  { char: '1', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '!', label: 'ext. filter',   cat: 'operator', tags: ['operators'] },
    notes: [2],
  },
  '2': {
    normal:  { char: '2', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '@', label: 'play macro',    cat: 'extra',   tags: ['macros'], dot: true },
    notes: [2],
  },
  '3': {
    normal:  { char: '3', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '#', label: 'prev ident',    cat: 'motion',  tags: ['search', 'moving'] },
    notes: [2],
  },
  '4': {
    normal:  { char: '4', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '$', label: 'end of line',   cat: 'motion',  tags: ['moving'] },
    notes: [2],
  },
  '5': {
    normal:  { char: '5', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '%', label: 'goto match',    cat: 'motion',  tags: ['moving'] },
    notes: [2],
  },
  '6': {
    normal:  { char: '6', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '^', label: 'soft bol',      cat: 'motion',  tags: ['moving'] },
    notes: [2],
  },
  '7': {
    normal:  { char: '7', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '&', label: 'repeat :s',     cat: 'command', tags: ['actions', 'search'] },
    notes: [2],
  },
  '8': {
    normal:  { char: '8', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '*', label: 'next ident',    cat: 'motion',  tags: ['search', 'moving'] },
    notes: [2],
  },
  '9': {
    normal:  { char: '9', label: 'count',         cat: 'count',   tags: [] },
    shifted: { char: '(', label: 'begin sent.',   cat: 'motion',  tags: ['moving'] },
    notes: [2],
  },
  '0': {
    normal:  { char: '0', label: 'hard bol',      cat: 'motion',  tags: ['moving'] },
    shifted: { char: ')', label: 'end sent.',     cat: 'motion',  tags: ['moving'] },
    notes: [],
  },
  '-': {
    normal:  { char: '-', label: 'prev line',     cat: 'motion',  tags: ['moving'] },
    shifted: { char: '_', label: 'soft bol \u2193',cat: 'motion', tags: ['moving'] },
    notes: [],
  },
  '=': {
    normal:  { char: '=', label: 'auto format',   cat: 'operator', tags: ['operators'] },
    shifted: { char: '+', label: 'next line',     cat: 'motion',  tags: ['moving'] },
    notes: [3],
  },
  'q': {
    normal:  { char: 'q', label: 'record macro',  cat: 'extra',   tags: ['macros'], dot: true },
    shifted: { char: 'Q', label: 'ex mode',       cat: 'command', tags: ['modes'] },
    notes: [],
  },
  'w': {
    normal:  { char: 'w', label: 'next word',     cat: 'motion',  tags: ['moving'] },
    shifted: { char: 'W', label: 'next WORD',     cat: 'motion',  tags: ['moving'] },
    notes: [],
  },
  'e': {
    normal:  { char: 'e', label: 'end word',      cat: 'motion',  tags: ['moving'] },
    shifted: { char: 'E', label: 'end WORD',      cat: 'motion',  tags: ['moving'] },
    notes: [],
  },
  'r': {
    normal:  { char: 'r', label: 'replace char',  cat: 'extra',   tags: ['actions'], dot: true },
    shifted: { char: 'R', label: 'replace mode',  cat: 'insert',  tags: ['modes', 'actions'] },
    notes: [],
  },
  't': {
    normal:  { char: 't', label: "'till",         cat: 'extra',   tags: ['moving'], dot: true },
    shifted: { char: 'T', label: "back 'till",    cat: 'extra',   tags: ['moving'], dot: true },
    notes: [],
  },
  'y': {
    normal:  { char: 'y', label: 'yank',          cat: 'operator', tags: ['operators', 'copy-paste'] },
    shifted: { char: 'Y', label: 'yank line',     cat: 'command',  tags: ['copy-paste'] },
    notes: [1, 3],
  },
  'u': {
    normal:  { char: 'u', label: 'undo',          cat: 'command',  tags: ['actions'] },
    shifted: { char: 'U', label: 'undo line',     cat: 'command',  tags: ['actions'] },
    notes: [],
  },
  'i': {
    normal:  { char: 'i', label: 'insert mode',   cat: 'insert',  tags: ['modes'] },
    shifted: { char: 'I', label: 'insert at bol', cat: 'insert',  tags: ['modes'] },
    notes: [],
  },
  'o': {
    normal:  { char: 'o', label: 'open below',    cat: 'insert',  tags: ['modes', 'actions'] },
    shifted: { char: 'O', label: 'open above',    cat: 'insert',  tags: ['modes', 'actions'] },
    notes: [],
  },
  'p': {
    normal:  { char: 'p', label: 'paste after',   cat: 'command',  tags: ['copy-paste'] },
    shifted: { char: 'P', label: 'paste before',  cat: 'command',  tags: ['copy-paste'] },
    notes: [1],
  },
  '[': {
    normal:  { char: '[', label: 'misc',          cat: 'extra',   tags: [], dot: true },
    shifted: { char: '{', label: 'begin parag.',  cat: 'motion',  tags: ['moving'] },
    notes: [],
  },
  ']': {
    normal:  { char: ']', label: 'misc',          cat: 'extra',   tags: [], dot: true },
    shifted: { char: '}', label: 'end parag.',    cat: 'motion',  tags: ['moving'] },
    notes: [],
  },
  '\\': {
    normal:  { char: '\\', label: 'leader',       cat: 'extra',   tags: [], dot: true },
    shifted: { char: '|', label: 'goto col',      cat: 'motion',  tags: ['moving'] },

// Returns the level (group) a key belongs to for a given tag.
// Returns 99 if not assigned to any group (only visible in Full).
function getKeyLevel(keyId, isShifted, tag) {
  var def = LEVEL_DEFS[tag];
  if (!def) return 1;
  var keyLevels = def.keys[keyId];
  if (!keyLevels) return 99;
  var l = isShifted ? keyLevels.s : keyLevels.n;
  return l !== undefined ? l : 99;
}

});

// =============================================================================
// DOM HELPERS — safe DOM construction (no innerHTML)
// =============================================================================
function el(tag, attrs, children) {
  var node = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'style' && typeof attrs[k] === 'object') {
        Object.keys(attrs[k]).forEach(function(p) { node.style[p] = attrs[k][p]; });
      } else if (k === 'className') {
        node.className = attrs[k];
      } else if (k.indexOf('data-') === 0) {
        node.setAttribute(k, attrs[k]);
      } else {
        node[k] = attrs[k];
      }
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (typeof c === 'string') {
        node.appendChild(document.createTextNode(c));
      } else if (c) {
        node.appendChild(c);
      }
    });
  }
  return node;
}

function clearEl(node) { while (node.firstChild) node.removeChild(node.firstChild); }

var $ = function(sel) { return document.querySelector(sel); };
var $$ = function(sel) { return document.querySelectorAll(sel); };

// =============================================================================
// RENDERING
// =============================================================================
function makeKeyEl(keyId, extraClass) {
  var w = KEY_WIDTHS[keyId];
  var cls = 'key';
  if (extraClass) cls += ' ' + extraClass;
  if (w !== undefined && w > 0) cls += ' key-wide';
  if (w === 0) cls += ' key-wide key-flex';
  if (FADED_KEYS[keyId]) cls += ' key-faded';
  var keyEl = el('div', { className: cls }, [
    el('span', { className: 'key-char' }),
    el('span', { className: 'key-label' }),
    el('span', { className: 'key-dot' }),
  ]);
  keyEl.setAttribute('data-key', keyId);
  if (w && w > 0) {
    keyEl.style.width = 'calc(' + w + ' * var(--key-size) + ' + (w - 1) + ' * var(--key-gap))';
  }
  keyEl.addEventListener('mouseenter', function() { showDetail(keyId); });
  keyEl.addEventListener('click', function(ev) { ev.stopPropagation(); selectKey(keyId); });
  return keyEl;
}

function renderFilters() {

  FILTERS.forEach(function(f) {
    var btn = el('button', { className: 'filter-btn' + (f.id === state.activeFilter ? ' active' : '') }, f.label);
    btn.addEventListener('click', function() {
      state.activeFilter = f.id;
      var def = LEVEL_DEFS[f.id];
      state.activeLevel = def ? 1 : 99;
      $$('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderLevelBar();
      updateDisplay();
    });
    cont.appendChild(btn);
  });

function renderLevelBar() {
  var bar = $('#level-bar');
  clearEl(bar);
  var def = LEVEL_DEFS[state.activeFilter];
  if (!def || def.max <= 1) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  bar.appendChild(el('span', null, 'Level:'));
  var btns = el('div', { className: 'level-btns' });
  for (var i = 1; i <= def.max; i++) {
    (function(level) {
      var btn = el('button', { className: 'level-btn' + (state.activeLevel === level ? ' active' : '') }, String(level));
      btn.addEventListener('click', function() {
        state.activeLevel = level;
        renderLevelBar();
        updateDisplay();
      });
      btns.appendChild(btn);
    })(i);
  }
  // Full button
  var fullBtn = el('button', { className: 'level-btn' + (state.activeLevel === 99 ? ' active' : '') }, 'Full');
  fullBtn.addEventListener('click', function() {
    state.activeLevel = 99;
    renderLevelBar();
    updateDisplay();
  });
  btns.appendChild(fullBtn);
  bar.appendChild(btns);
  if (def.labels && state.activeLevel !== 99 && def.labels[state.activeLevel - 1]) {
    bar.appendChild(el('span', { className: 'level-label' }, def.labels[state.activeLevel - 1]));
  }
}

function updateDisplay() {
  var shift = isShiftActive();
  var query = state.searchQuery.toLowerCase();

  // Update shift toggle visual
  var track = $('#shift-toggle');
  if (state.shiftLocked || physicalShiftHeld) {
    track.classList.add('active');
  } else {
    track.classList.remove('active');
  }

  $$('.key').forEach(function(keyEl) {
    var keyId = keyEl.getAttribute('data-key');
    var data = KEYS[keyId];
    var layer = shift ? data.shifted : data.normal;

    // Update displayed content
    keyEl.querySelector('.key-char').textContent = layer.char;
    keyEl.querySelector('.key-label').textContent = layer.label;
    keyEl.querySelector('.key-dot').textContent = layer.dot ? '\xb7' : '';
    keyEl.setAttribute('data-cat', layer.cat);

    // Determine if key matches current filter + search + level
    var otherLayer = shift ? data.normal : data.shifted;
    var matchesFilter = state.activeFilter === 'all' ||
      (layer.tags.indexOf(state.activeFilter) >= 0 &&
       (state.activeLevel === 99 || getKeyLevel(keyId, shift, state.activeFilter) === state.activeLevel));
    var matchesSearch = !query ||
      layer.label.toLowerCase().indexOf(query) >= 0 ||
      layer.char.toLowerCase().indexOf(query) >= 0 ||
      otherLayer.label.toLowerCase().indexOf(query) >= 0 ||
      otherLayer.char.toLowerCase().indexOf(query) >= 0;

    var active = matchesFilter && matchesSearch;
    keyEl.classList.toggle('dimmed', !active);
    keyEl.classList.toggle('selected', state.selectedKey === keyId);

    // Unfade faded keys when physically pressed
    if (FADED_KEYS[keyId]) {
      var isHeld = !!physicalKeysHeld[keyId];
      keyEl.classList.toggle('key-faded', !isHeld);
      keyEl.classList.toggle('key-pressed', isHeld);
    }
  });
}

// =============================================================================
// DETAIL PANEL
// =============================================================================
function showDetail(keyId) {
  if (state.selectedKey) return;
  renderDetail(keyId);
}

function selectKey(keyId) {
  if (state.selectedKey === keyId) {
    state.selectedKey = null;
    renderDetailPlaceholder();
  } else {
    state.selectedKey = keyId;
    renderDetail(keyId);
  }
  updateDisplay();
}

function renderDetailPlaceholder() {
  var panel = $('#detail');
  clearEl(panel);
  panel.appendChild(el('div', { className: 'detail-placeholder' }, 'Hover or click any key to see details. Press keys on your keyboard to explore.'));
}

function renderDetail(keyId) {
  var data = KEYS[keyId];
  var panel = $('#detail');
  var shift = isShiftActive();
  var primary = shift ? data.shifted : data.normal;
  var secondary = shift ? data.normal : data.shifted;
  var meta = CAT_META[primary.cat];
  var secMeta = CAT_META[secondary.cat];

  clearEl(panel);

  // Header
  var headerInfo = el('div', null, [
    el('div', { className: 'detail-title' }, primary.label),
    el('span', { className: 'detail-cat', style: { color: meta.color, borderColor: meta.color } }, meta.label),
  ]);
  if (primary.dot) {
    headerInfo.appendChild(document.createTextNode(' '));
    headerInfo.appendChild(el('span', { style: { color: 'var(--text-dim)', fontSize: '0.75rem' } }, '\xb7 expects character argument'));
  }

  var header = el('div', { className: 'detail-header' }, [
    el('span', { className: 'detail-keychar', style: { color: meta.color } }, primary.char),
    headerInfo,
  ]);
  panel.appendChild(header);

  // Body sections
  var body = el('div', { className: 'detail-body' });

  // Category description
  var catSection = el('div', { className: 'detail-section' }, [
    el('h4', null, 'Category'),
    el('p', null, meta.desc),
  ]);
  body.appendChild(catSection);

  // Other layer
  var otherSection = el('div', { className: 'detail-section' }, [
    el('h4', null, (shift ? 'Normal' : 'Shifted') + ' (' + secondary.char + ')'),
    el('p', { style: { color: secMeta.color } }, secondary.label),
    el('p', { style: { fontSize: '0.75rem', color: 'var(--text-dim)' } }, secMeta.label),
  ]);
  body.appendChild(otherSection);

  // Ctrl key: show all Ctrl commands
  if (keyId === 'LCtrl' || keyId === 'RCtrl') {
    var ctrlSection = el('div', { className: 'detail-section' }, [el('h4', null, 'Ctrl commands')]);
    var ul = el('ul');
    CTRL_COMMANDS.forEach(function(c) {
      ul.appendChild(el('li', null, [
        el('span', { style: { fontFamily: 'monospace', color: 'var(--cat-command)' } }, c.cmd),
        document.createTextNode(' \u2014 ' + c.desc),
      ]));
    });
    ctrlSection.appendChild(ul);
    body.appendChild(ctrlSection);
  }

  // CapsLock: show remap tip
  if (keyId === 'CapsLock') {
    var capsSection = el('div', { className: 'detail-section' }, [
      el('h4', null, 'Tip'),
      el('p', null, 'Caps Lock has no native Vim binding. Most Vim users remap it to Escape for faster mode switching, since Esc is the most frequently used key.'),
    ]);
    body.appendChild(capsSection);
  }

  // Text objects (for operators)
  if (primary.cat === 'operator') {
    var toSection = el('div', { className: 'detail-section' }, [el('h4', null, 'Works with text objects')]);
    var ul = el('ul');
    TEXT_OBJECTS.forEach(function(to) {
      var combo = primary.char + to.keys.split(' / ')[0];
      var li = el('li', null, [
        el('span', { style: { fontFamily: 'monospace', color: 'var(--cat-operator)' } }, combo),
        document.createTextNode(' \u2014 ' + to.label),
      ]);
      ul.appendChild(li);
    });
    toSection.appendChild(ul);
    body.appendChild(toSection);
  }

  panel.appendChild(body);

  // Notes
  if (data.notes.length > 0) {
    data.notes.forEach(function(n) {
      var noteDiv = el('div', { className: 'note-ref' }, [
        el('strong', null, 'Note ' + n + ': '),
        document.createTextNode(NOTES[n]),
      ]);
      panel.appendChild(noteDiv);
    });
  }
}

// =============================================================================
// EVENT HANDLERS
// =============================================================================
function initEvents() {
  var searchInput = $('#search');

  searchInput.addEventListener('input', function(e) {
    state.searchQuery = e.target.value;
    updateDisplay();
  });

  $('#shift-toggle').addEventListener('click', function() {
    state.shiftLocked = !state.shiftLocked;
    updateDisplay();
    if (state.selectedKey) renderDetail(state.selectedKey);
  });

  // Theme selector
  var themeSelect = $('#theme-select');
  var savedTheme = localStorage.getItem('vim-cheat-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeSelect.value = savedTheme;
  }
  themeSelect.addEventListener('change', function(e) {
    var theme = e.target.value;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('vim-cheat-theme', theme);
  });

  // Helper: switch to a filter by index
  function setFilterByIndex(idx) {
    if (idx < 0) idx = FILTERS.length - 1;
    if (idx >= FILTERS.length) idx = 0;
    var f = FILTERS[idx];
    state.activeFilter = f.id;
    var def = LEVEL_DEFS[f.id];
    state.activeLevel = def ? 1 : 99;
    $$('.filter-btn').forEach(function(b, i) {
      b.classList.toggle('active', i === idx);
    });
    renderLevelBar();
    updateDisplay();
  }

  // Helper: change level within current filter
  // Levels cycle: 1, 2, ..., max, 99 (Full)
  function adjustLevel(delta) {
    var def = LEVEL_DEFS[state.activeFilter];
    if (!def || def.max <= 1) return;
    var steps = [];
    for (var i = 1; i <= def.max; i++) steps.push(i);
    steps.push(99);
    var curIdx = steps.indexOf(state.activeLevel);
    var nextIdx = curIdx + delta;
    if (nextIdx < 0) nextIdx = 0;
    if (nextIdx >= steps.length) nextIdx = steps.length - 1;
    if (nextIdx === curIdx) return;
    state.activeLevel = steps[nextIdx];
    renderLevelBar();
    updateDisplay();
  }

  document.addEventListener('keydown', function(e) {
    // Arrow keys work even when search is focused
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      var curIdx = FILTERS.findIndex(function(f) { return f.id === state.activeFilter; });
      setFilterByIndex(curIdx + (e.key === 'ArrowRight' ? 1 : -1));
      e.preventDefault();
      return;
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      adjustLevel(e.key === 'ArrowUp' ? 1 : -1);
      e.preventDefault();
      return;
    }

    if (document.activeElement === searchInput) return;

    // Track physical modifier/faded key presses for visual feedback
    var fadedKeyMap = {
      'Shift': e.location === 2 ? 'RShift' : 'LShift',
      'Control': e.location === 2 ? 'RCtrl' : 'LCtrl',
      'Alt': e.location === 2 ? 'RAlt' : 'LAlt',
      'Meta': e.location === 2 ? 'RMeta' : 'LMeta',
      'CapsLock': 'CapsLock', 'Tab': 'Tab',
      'Backspace': 'Backspace', 'Enter': 'Enter', ' ': 'Space',
    };
    if (fadedKeyMap[e.key]) {
      physicalKeysHeld[fadedKeyMap[e.key]] = true;
    }

    if (e.key === 'Shift') {
      physicalShiftHeld = true;
      updateDisplay();
      if (state.selectedKey) renderDetail(state.selectedKey);
      return;
    }
    if (e.key === 'Escape') {
      if (state.selectedKey || state.searchQuery) {
        state.selectedKey = null;
        state.searchQuery = '';
        searchInput.value = '';
        renderDetailPlaceholder();
        updateDisplay();
      } else {
        selectKey('Escape');
      }
      return;
    }

    // Map special physical keys to our key IDs
    var specialMap = {
      'Tab': 'Tab', 'Backspace': 'Backspace', 'Enter': 'Enter',
      ' ': 'Space', 'Control': 'LCtrl', 'CapsLock': 'CapsLock',
      'Alt': 'LAlt', 'Meta': 'LMeta',
    };
    if (specialMap[e.key]) {
      selectKey(specialMap[e.key]);
      e.preventDefault();
      return;
    }

    var ch = e.key;
    if (ch.length === 1) {
      var physKey = ch.toLowerCase();
      if (KEYS[physKey]) {
        selectKey(physKey);
      } else if (SHIFTED_TO_PHYS[ch]) {
        physKey = SHIFTED_TO_PHYS[ch];
        if (!isShiftActive()) { state.shiftLocked = true; }
        selectKey(physKey);
      }
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', function(e) {
    // Clear physical held state for faded keys
    var fadedKeyMap = {
      'Shift': e.location === 2 ? 'RShift' : 'LShift',
      'Control': e.location === 2 ? 'RCtrl' : 'LCtrl',
      'Alt': e.location === 2 ? 'RAlt' : 'LAlt',
      'Meta': e.location === 2 ? 'RMeta' : 'LMeta',
      'CapsLock': 'CapsLock', 'Tab': 'Tab',
      'Backspace': 'Backspace', 'Enter': 'Enter', ' ': 'Space',
    };
    if (fadedKeyMap[e.key]) {
      delete physicalKeysHeld[fadedKeyMap[e.key]];
      updateDisplay();
    }

    if (e.key === 'Shift') {
      physicalShiftHeld = false;
      updateDisplay();
      if (state.selectedKey) renderDetail(state.selectedKey);
    }
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.key') && !e.target.closest('.detail-panel')) {
      state.selectedKey = null;
      renderDetailPlaceholder();
      updateDisplay();
    }
  });
}

// =============================================================================
// INIT
// =============================================================================
function init() {
  renderKeyboard();
  renderFilters();
  renderLegend();
  renderRefList('ex-cmds', EX_COMMANDS);
  renderRefList('ctrl-cmds', CTRL_COMMANDS);
  renderTips();
  renderCredit();
  renderDetailPlaceholder();
  updateDisplay();
  initEvents();
}

init();
</script>
